<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karen from Accounting</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F2ED;
    --surface: #FFFFFF;
    --surface2: #F0EDE8;
    --border: #D8D3CC;
    --text: #1A1814;
    --text2: #6B6560;
    --text3: #A09B96;
    --green: #3B6D11;
    --green-bg: #EAF3DE;
    --red: #A32D2D;
    --red-bg: #FCEBEB;
    --purple: #3C3489;
    --purple-bg: #EEEDFE;
    --amber: #854F0B;
    --amber-bg: #FAEEDA;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .page {
    width: 100%;
    max-width: 520px;
  }

  .header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .header h1 {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 0.5rem;
  }

  .header p {
    font-size: 11px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
  }

  .device {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 0 var(--border);
  }

  .device-header {
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
  }

  .avatar {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: var(--purple-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--purple);
    flex-shrink: 0;
    border: 1px solid #CECBF6;
  }

  .info { flex: 1; }

  .info .name {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 2px;
  }

  .info .role {
    font-size: 12px;
    color: var(--text2);
    font-family: 'DM Mono', monospace;
  }

  .status-area {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.4s ease;
  }

  .status-dot.on { background: var(--green); box-shadow: 0 0 0 3px var(--green-bg); }

  .clock {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
  }

  .device-body { padding: 1.5rem; }

  .bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    font-size: 14px;
    line-height: 1.65;
    color: var(--text);
    min-height: 80px;
    margin-bottom: 1.25rem;
    position: relative;
    transition: opacity 0.2s ease;
    font-style: italic;
  }

  .bubble::before {
    content: '"';
    font-family: 'DM Mono', monospace;
    font-size: 28px;
    color: var(--border);
    position: absolute;
    top: 6px;
    left: 12px;
    line-height: 1;
  }

  .bubble-text { padding-left: 16px; }

  .modes {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 1.25rem;
  }

  .mode-btn {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 8px 6px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: center;
  }

  .mode-btn:hover { background: var(--surface2); color: var(--text); border-color: #B8B3AC; }
  .mode-btn:active { transform: scale(0.97); }

  .mode-btn.monday { --accent: var(--amber-bg); --accent-b: var(--amber); }
  .mode-btn.friday { --accent: var(--green-bg); --accent-b: var(--green); }
  .mode-btn.biscuit { --accent: #FBEAF0; --accent-b: #993556; }
  .mode-btn.kids { --accent: var(--purple-bg); --accent-b: var(--purple); }
  .mode-btn.lunch { --accent: var(--amber-bg); --accent-b: var(--amber); }
  .mode-btn.time { --accent: var(--surface2); --accent-b: var(--text2); }

  .mode-btn.active {
    background: var(--accent);
    color: var(--accent-b);
    border-color: var(--accent-b);
  }

  .plug-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .plug-btn {
    flex: 1;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 11px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .plug-btn:hover { background: var(--surface2); }
  .plug-btn:active { transform: scale(0.98); }

  .plug-btn.plugged {
    background: var(--red-bg);
    border-color: #F09595;
    color: var(--red);
  }

  .plug-status {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    text-align: right;
    min-width: 80px;
  }

  .plug-status.warning { color: var(--red); }

  .footer {
    text-align: center;
    margin-top: 1.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.05em;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .bubble-text.animate { animation: fadeIn 0.25s ease forwards; }
</style>
</head>
<body>

<div class="page">
  <div class="header">
    <h1>Karen from Accounting</h1>
    <p>v1.0 — A completely useless office device</p>
  </div>

  <div class="device">
    <div class="device-header">
      <div class="avatar">KA</div>
      <div class="info">
        <div class="name">Karen Alderman</div>
        <div class="role">Senior Specialist, Pointless Observations</div>
      </div>
      <div class="status-area">
        <div class="status-dot" id="status-dot"></div>
        <div class="clock" id="clock"></div>
      </div>
    </div>

    <div class="device-body">
      <div class="bubble">
        <div class="bubble-text" id="bubble-text">Plug me in to activate Karen.</div>
      </div>

      <div class="modes">
        <button class="mode-btn monday" onclick="triggerMode('monday', this)">Monday</button>
        <button class="mode-btn friday" onclick="triggerMode('friday', this)">Friday 5pm</button>
        <button class="mode-btn biscuit" onclick="triggerMode('biscuit', this)">Biscuit</button>
        <button class="mode-btn kids" onclick="triggerMode('kids', this)">The Kids</button>
        <button class="mode-btn lunch" onclick="triggerMode('lunch', this)">Lunch</button>
        <button class="mode-btn time" onclick="triggerMode('time', this)">Time Check</button>
      </div>

      <div class="plug-row">
        <button class="plug-btn" id="plug-btn" onclick="togglePlug()">Plug in</button>
        <div class="plug-status" id="plug-status">unplugged</div>
      </div>
    </div>
  </div>

  <div class="footer">Made with zero corporate approval &nbsp;·&nbsp; Patent pending (not really)</div>
</div>

<script>
const lines = {
  monday: [
    "So anyway, Biscuit did the FUNNIEST thing on Saturday. He found my husband's slipper and just... sat on it. The whole afternoon.",
    "Did you have a good weekend? Mine was okay. Took the kids to soccer. Tyler scored. Well, almost scored. The ball kind of went sideways.",
    "Ugh. Monday again. I swear the weekend gets shorter every week. Does that happen to you? It must be psychological.",
    "I made a casserole Sunday. Tried a new recipe. It was... fine. My husband said it was great but he says that about everything.",
    "I cannot believe it's only 10am. I've already been here for two hours. TWO hours. And yet nothing has happened.",
  ],
  friday: [
    "Okay so if I leave at 4:47, I can catch the 4:53 bus, which gives me 6 minutes. That's including the elevator. I've timed it.",
    "It's 4:30. I'm basically done. I mean, I'm still HERE, but mentally I'm already on the bus.",
    "Have a great weekend everyone! I'll be back Monday obviously. Unfortunately.",
    "I'm going to start shutting down my computer at 4:44 so it's fully off by 4:47. The fan takes about 90 seconds. I've checked.",
    "Does anyone actually do work after 4pm on a Friday? Asking for a friend. The friend is me.",
  ],
  biscuit: [
    "Biscuit is a golden retriever mix. Well, the vet thinks mix. He has the personality of a golden but the ears of something else. We don't know.",
    "He ate a sock last month. A whole sock. We only noticed because of the... aftermath. The vet said he'd be fine. He was fine.",
    "Biscuit does not understand Mondays. He looked at me this morning like 'why are you leaving' and honestly I didn't have a good answer.",
    "He's not allowed on the couch. He knows this. He gets on the couch anyway. We've had a talk. Multiple talks. It hasn't worked.",
    "Biscuit sneezed on my report last Tuesday. I had to reprint it. Nobody asked why. I appreciated that.",
  ],
  kids: [
    "Tyler is going through a phase. The school says it's 'normal' but I don't know. He corrects the teacher about dinosaurs. Constantly.",
    "Emma wants a hamster now. We already have Biscuit. I don't think Biscuit would be... appropriate around a hamster.",
    "Tyler scored at soccer on Saturday. Well, he attempted a shot. It went wide. But the effort was there. We cheered anyway.",
    "Emma made me a birthday card that said 'you're the best mom mostly.' MOSTLY. She's eight.",
    "Tyler asked me what inflation was. I said 'ask your father.' His father said 'ask your mother.' Tyler googled it. We have failed.",
  ],
  lunch: [
    "I'm going to go get a sandwich. The good place, not the sad place. I deserve the good place today.",
    "I had leftovers but I left them at home. So now I have to decide. I've been deciding for 20 minutes.",
    "The line at the sandwich place is always long at 12:15. I've started going at 11:47. I feel like I've cracked a code.",
    "I'm doing a salad. Starting fresh. I said this last Tuesday also. And the Tuesday before that.",
    "Someone microwaved fish in the break room again. I don't want to point fingers but it was definitely David.",
  ],
  time: [
    "Ugh. Another minute just passed. That's one more minute. Just gone. Just like that.",
    "You know what's wild? It's only been an hour since I last checked. It felt like longer. It always feels like longer.",
    "The clock in this office is slightly fast. 40 seconds ahead. So technically it's earlier than we think. I find that comforting.",
    "Three hours until lunch. Two hours and forty-eight minutes, actually. I've been tracking.",
    "It's Wednesday. We are statistically at peak week. It does not feel like peak week.",
  ]
};

let plugged = false;
let modeIndex = {};
let activeBtn = null;
let clockInterval = null;

function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
}

function togglePlug() {
  plugged = !plugged;
  const btn = document.getElementById('plug-btn');
  const dot = document.getElementById('status-dot');
  const statusEl = document.getElementById('plug-status');

  if (plugged) {
    btn.textContent = 'Unplug Karen';
    btn.classList.add('plugged');
    dot.classList.add('on');
    statusEl.textContent = 'please unplug me';
    statusEl.className = 'plug-status warning';
    setText("Oh good, you turned me on. Did you hear about Biscuit?");
    clockInterval = setInterval(updateClock, 1000);
    updateClock();
  } else {
    btn.textContent = 'Plug in';
    btn.classList.remove('plugged');
    dot.classList.remove('on');
    statusEl.textContent = 'unplugged';
    statusEl.className = 'plug-status';
    setText("Fine. I'll just sit here then.");
    if (activeBtn) { activeBtn.classList.remove('active'); activeBtn = null; }
    clearInterval(clockInterval);
  }
}

function setText(text) {
  const el = document.getElementById('bubble-text');
  el.classList.remove('animate');
  void el.offsetWidth;
  el.textContent = text;
  el.classList.add('animate');
}

function triggerMode(mode, btn) {
  if (!plugged) {
    setText("I'm not even plugged in. Please.");
    return;
  }
  if (activeBtn && activeBtn !== btn) activeBtn.classList.remove('active');
  btn.classList.add('active');
  activeBtn = btn;
  if (!modeIndex[mode]) modeIndex[mode] = 0;
  const arr = lines[mode];
  setText(arr[modeIndex[mode] % arr.length]);
  modeIndex[mode]++;
}

updateClock();
</script>
</body>
</html>
